services:
  flask-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aceest-fitness-api
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/instance/aceest_fitness.db}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ui-app:
    build:
      context: ./ui_app
      dockerfile: Dockerfile
    container_name: aceest-fitness-ui
    ports:
      - "6080:6080"
    environment:
      API_BASE_URL: http://flask-app:5000
    depends_on:
      flask-app:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: aceest-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - flask-app
      - ui-app
    restart: unless-stopped

  jenkins:
    image: jenkins/jenkins:lts
    container_name: aceest-jenkins
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      JAVA_OPTS: "-Djenkins.install.runSetupWizard=false"
    restart: unless-stopped

volumes:
  jenkins_home:
