name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  IMAGE_NAME: aceest-fitness-api
  PYTHON_VERSION: "3.11"

jobs:

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — BUILD & LINT
  # Installs dependencies, validates the app imports cleanly, runs Flake8 + Black
  # ────────────────────────────────────────────────────────────────────────────
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: flask_app/requirements.txt

      - name: Install application dependencies
        working-directory: flask_app
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt

      - name: Install lint tools
        run: pip install flake8 black pylint

      - name: Validate application compiles (syntax check)
        working-directory: flask_app
        run: |
          echo "── Checking Python syntax ──────────────────────"
          python -m py_compile app.py
          python -m py_compile config.py
          find . -name "*.py" \
                 -not -path "./__pycache__/*" \
                 -not -path "./tests/*" \
                 -not -path "./instance/*" \
            | xargs python -m py_compile
          echo "All files compiled without syntax errors."

      - name: Validate Flask app instantiates cleanly
        working-directory: flask_app
        env:
          DATABASE_URL: sqlite:////tmp/ci_test.db
        run: |
          python - <<'EOF'
          import sys, os
          sys.path.insert(0, ".")
          from flask import Flask
          from config import Config
          app = Flask(__name__)
          app.config.from_object(Config)
          print(f"Flask app '{app.name}' instantiated — Python {sys.version}")
          EOF

      - name: Flake8 — syntax & style errors
        working-directory: flask_app
        run: |
          echo "── Flake8 (errors only, E/F/W codes) ─────────"
          flake8 . \
            --count \
            --select=E,F,W \
            --max-line-length=127 \
            --max-complexity=10 \
            --exclude=__pycache__,tests,instance,.venv \
            --statistics \
            --exit-zero

      - name: Black — code format check
        working-directory: flask_app
        run: |
          echo "── Black format check ──────────────────────────"
          black --check --diff \
            --exclude "/(tests|instance|__pycache__|\.venv)/" \
            . || true

      - name: Pylint — code quality score
        working-directory: flask_app
        run: |
          echo "── Pylint (errors + fatal only) ────────────────"
          pylint \
            --disable=all \
            --enable=E,F \
            --ignore=tests,instance,__pycache__ \
            $(find . -name "*.py" -not -path "./tests/*" \
                                  -not -path "./instance/*" \
                                  -not -path "./__pycache__/*") \
            || true

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — DOCKER IMAGE ASSEMBLY
  # Builds the Flask API Docker image; confirms it starts and responds
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Image Assembly
    runs-on: ubuntu-latest
    needs: build-and-lint

    outputs:
      short_sha: ${{ steps.meta.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "Image tag will be: ${{ env.IMAGE_NAME }}:${SHORT_SHA}"

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.short_sha }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image exists
        run: |
          echo "── Built images ────────────────────────────────"
          docker images ${{ env.IMAGE_NAME }}

      - name: Smoke-test — container starts and responds
        run: |
          echo "── Starting container ──────────────────────────"
          docker run -d \
            --name smoke-test \
            -p 5000:5000 \
            -e DATABASE_URL=sqlite:////app/instance/ci.db \
            -e FLASK_ENV=testing \
            ${{ env.IMAGE_NAME }}:latest

          echo "── Waiting for Flask to be ready (max 30s) ─────"
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5000/ > /dev/null 2>&1; then
              echo "Container is healthy (attempt ${i})"
              break
            fi
            echo "Attempt ${i}/15 — waiting..."
            sleep 2
          done

          echo "── Container logs ──────────────────────────────"
          docker logs smoke-test

          echo "── Checking container is still running ─────────"
          docker ps | grep smoke-test

          docker stop smoke-test && docker rm smoke-test

      - name: Save image as artifact
        run: |
          docker save ${{ env.IMAGE_NAME }}:latest | gzip > /tmp/image.tar.gz
          echo "Image saved: $(du -sh /tmp/image.tar.gz | cut -f1)"

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar.gz
          retention-days: 3

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 3 — AUTOMATED TESTING (inside the container)
  # Loads the built image, runs the full Pytest suite inside it,
  # publishes JUnit results and enforces 60% coverage quality gate
  # ────────────────────────────────────────────────────────────────────────────
  automated-testing:
    name: Automated Testing (Containerized)
    runs-on: ubuntu-latest
    needs: docker-build

    permissions:
      checks: write
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp/

      - name: Load Docker image
        run: |
          echo "── Loading image ────────────────────────────────"
          docker load < /tmp/image.tar.gz
          docker images ${{ env.IMAGE_NAME }}

      - name: Run Pytest suite inside container
        run: |
          mkdir -p /tmp/test-results
          echo "── Running full test suite inside container ────"
          docker run --rm \
            --name aceest-tests \
            -e DATABASE_URL=sqlite:////tmp/test.db \
            -e FLASK_ENV=testing \
            -v "${{ github.workspace }}/flask_app/tests:/app/tests:ro" \
            -v "${{ github.workspace }}/flask_app/conftest.py:/app/conftest.py:ro" \
            -v "${{ github.workspace }}/flask_app/pytest.ini:/app/pytest.ini:ro" \
            -v /tmp/test-results:/app/junit \
            ${{ env.IMAGE_NAME }}:latest \
            python -m pytest tests/ \
              -v \
              --tb=short \
              -m "not slow" \
              --cov=. \
              --cov-report=xml:/app/junit/coverage.xml \
              --cov-report=term-missing \
              --junitxml=/app/junit/test-results.xml \
              --ignore=tests/__pycache__ \
            || true

      - name: Display test summary
        if: always()
        run: |
          echo "── Test Results ────────────────────────────────"
          if [ -f /tmp/test-results/test-results.xml ]; then
            grep -o 'tests="[^"]*"'    /tmp/test-results/test-results.xml | head -1 || true
            grep -o 'failures="[^"]*"' /tmp/test-results/test-results.xml | head -1 || true
            grep -o 'errors="[^"]*"'   /tmp/test-results/test-results.xml | head -1 || true
          else
            echo "No test-results.xml found"
          fi
          echo "── Coverage ────────────────────────────────────"
          if [ -f /tmp/test-results/coverage.xml ]; then
            grep -o 'line-rate="[^"]*"' /tmp/test-results/coverage.xml | head -1 || true
          fi

      - name: Copy results for publishing
        if: always()
        run: |
          cp -r /tmp/test-results ${{ github.workspace }}/test-results || true

      - name: Publish JUnit test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: test-results/test-results.xml
          check_name: "Pytest Results (Container)"
          comment_mode: always
          fail_on: "test failures"

      - name: Upload test results and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-containerized
          path: /tmp/test-results/
          retention-days: 7

      - name: Enforce coverage quality gate (60%)
        run: |
          if [ ! -f /tmp/test-results/coverage.xml ]; then
            echo "WARNING: coverage.xml not found, skipping gate"
            exit 0
          fi
          RATE=$(grep -o 'line-rate="[^"]*"' /tmp/test-results/coverage.xml \
                   | head -1 | grep -o '[0-9.]*')
          PCT=$(echo "$RATE * 100" | bc -l | xargs printf "%.1f")
          echo "Coverage: ${PCT}%  |  Required: 60%"
          PASS=$(echo "$RATE >= 0.60" | bc -l)
          if [ "$PASS" -eq 1 ]; then
            echo "QUALITY GATE PASSED"
          else
            echo "QUALITY GATE FAILED — coverage ${PCT}% is below 60%"
            exit 1
          fi

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 4 — PIPELINE SUMMARY
  # ────────────────────────────────────────────────────────────────────────────
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [build-and-lint, docker-build, automated-testing]
    if: always()

    steps:
      - name: Report pipeline result
        run: |
          echo "════════════════════════════════════════════════"
          echo " ACEest Fitness CI/CD Pipeline Summary"
          echo "════════════════════════════════════════════════"
          echo " Branch  : ${{ github.ref_name }}"
          echo " Commit  : ${{ github.sha }}"
          echo " Trigger : ${{ github.event_name }}"
          echo "────────────────────────────────────────────────"
          echo " Build & Lint     : ${{ needs.build-and-lint.result }}"
          echo " Docker Assembly  : ${{ needs.docker-build.result }}"
          echo " Automated Tests  : ${{ needs.automated-testing.result }}"
          echo "════════════════════════════════════════════════"

          if [ "${{ needs.build-and-lint.result }}"    = "failure" ] || \
             [ "${{ needs.docker-build.result }}"      = "failure" ] || \
             [ "${{ needs.automated-testing.result }}" = "failure" ]; then
            echo " PIPELINE STATUS: FAILED"
            exit 1
          else
            echo " PIPELINE STATUS: PASSED"
          fi
