[pytest]
# Pytest configuration for ACEest Fitness API

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Test paths
testpaths = tests

# Output and reporting
addopts = 
    -v
    --strict-markers
    --tb=short

# Markers for test classification
markers =
    unit: Unit tests for isolated components
    integration: Integration tests across multiple components
    edge_case: Edge case and boundary value tests
    negative: Negative tests for error handling
    slow: Tests that take extended runtime
